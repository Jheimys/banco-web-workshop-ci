name: CI Pipeline

on: 
  push:
    branches: ["main"]

env:
  API_BASE_URL: 'http://localhost:3000'
  PORT: 4000

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: npm install

      - name: Iniciar servidor de mocks
        run: npm run mock-server &
        shell: bash

      - name: Aguardar mock-server iniciar
        run: sleep 3 && npx wait-on http://localhost:3000 --timeout 20000 --verbose
        shell: bash

      - name: Iniciar aplicação
        run: npm run server &
        shell: bash

      - name: Aguardar aplicação iniciar
        run: sleep 2 && npx wait-on http://localhost:4000 --timeout 20000 --verbose
        shell: bash

      - name: Executar testes (Cypress)
        run: npx cypress run
